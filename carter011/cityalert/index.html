* {

  border-radius: 10px;

  flex-direction: column;
  height: 600px;

.header {
  padding: 15px;
  background: #002080;
  color: white;
  border-radius: 10px 10px 0 0;
  text-align: center;

  background: #e6e6e6;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.message {

  padding: 10px 15px;
  border-radius: 20px;
  position: relative;
  line-height: 1.4;
  font-size: 14px;
  white-space: pre-wrap;
  word-wrap: break-word;
}

.message.bot {
  background: #002080;
  color: white;
  align-self: flex-start;
  border-top-left-radius: 0;
}

.message.bot::after {
  content: "";
  position: absolute;
  top: 10px;
  left: -10px;
  width: 0;
  height: 0;
  border-top: 10px solid transparent;
  border-right: 10px solid #002080;
  border-bottom: 10px solid transparent;
}

.message.user {
  background: #0084ff;
  color: white;
  align-self: flex-end;
  border-top-right-radius: 0;
}

.message.user::after {
  content: "";

  height: 0;

  border-bottom: 10px solid transparent;
}

.input-area {
  display: flex;
  padding: 10px;
  border-top: 1px solid #ccc;
}

input[type="text"] {
  flex: 1;
  padding: 10px;
  border: 1px solid #999;
  border-radius: 20px;
  font-size: 14px;
  outline: none;
}

input[type="text"]:focus {

}

button {

  background: #0084ff;

  color: white;
  padding: 0 20px;
  border-radius: 20px;
  cursor: pointer;
  font-size: 14px;
  font-weight: 600;
  transition: background 0.2s;
}

button:hover {
  background: #005bb5;
}

button:active {
  transform: scale(0.95);
}
</style>
</head>

function addMessage(text, sender) {
  let chatBox = document.getElementById("chatBox");
  let msg = document.createElement("div");
  msg.className = "message " + sender;
  msg.textContent = text;
  chatBox.appendChild(msg);
  chatBox.scrollTop = chatBox.scrollHeight;
}

<script>
function sendMessage() {
  let input = document.getElementById("userInput").value;
  if (!input) return;

  addMessage(input, "user");
  
  // If waiting for details, process the answer
  if (conversationState.awaitingDetails) {
    processDetailAnswer(input.toLowerCase());
  } else {
    let response = getBotResponse(input.toLowerCase());
    addMessage(response, "bot");
  }
  
  document.getElementById("userInput").value = "";
}

function processDetailAnswer(input) {
  // Store the user's response
  conversationState.userResponses.push(input);
  conversationState.questionsAsked++;
  
  // Ask next question if available
  const currentIssue = issueDatabase[conversationState.issueType];
  if (conversationState.questionsAsked < currentIssue.questions.length) {
    let nextQuestion = currentIssue.questions[conversationState.questionsAsked];
    addMessage(nextQuestion, "bot");
  } else {
    // All questions answered - provide final response
    let finalMessage = currentIssue.response;
    finalMessage += "\n\nрЯУЛ Summary of your issue:\n";
    
    for (let i = 0; i < conversationState.userResponses.length; i++) {
      finalMessage += `вАҐ ${conversationState.userResponses[i]}\n`;
    }
    
    finalMessage += "\nвЬЕ Make sure to have this info when you call!";
    
    addMessage(finalMessage, "bot");
    
    // Reset conversation state
    resetConversation();
  }
}

function getBotResponse(input) {
  // Check for menu/help
  if (/help|menu|options|what can you help|list|all|show|what do you do/.test(input)) {
    let menuText = "Cool! I can help with:\n\n";
    for (let key in issueDatabase) {
      menuText += `${key}. ${issueDatabase[key].emoji} ${issueDatabase[key].name}\n`;
    }
    menuText += "\nJust type the number or tell me what's wrong!";
    return menuText;
  }

  // Check for emergency
  if (/emergency|danger|urgent|fire|crime|accident|police|911/.test(input)) {
    return "рЯЪ® IF THIS IS AN EMERGENCY, CALL 911 RIGHT NOW!\n\nDon't wait. Fire, crime, accidents, injuries - call 911 immediately!";
  }

  // Check for greetings
  if (/hello|hi|hey|greetings|good morning|good afternoon|good evening|what's up|yo/.test(input)) {
    const greetings = [
      "Hey there! What's going on in Pasco?",
      "Hi! I'm here to help. What city issue are you dealing with?",
      "Hey! What can I do for you today?",
      "What's up? Tell me what's wrong with your area."
    ];
    return greetings[Math.floor(Math.random() * greetings.length)];
  }

  // Check if input is a number
  if (/^\d+$/.test(input)) {
    if (issueDatabase[input]) {
      startDetailedQuestions(input);
      return "Got it! Let me ask you a few questions to get more details.\n\n" + issueDatabase[input].questions[0];
    } else {
      return "Sorry, that number isn't in my list. Type 'menu' to see all options (1-15).";
    }
  }

  // Check if input matches an issue name
  for (let key in issueDatabase) {
    if (input.includes(issueDatabase[key].name.toLowerCase())) {
      startDetailedQuestions(key);
      return "Got it! Let me ask you a few questions to get more details.\n\n" + issueDatabase[key].questions[0];
    }
  }

  // Check keywords
  for (let key in issueDatabase) {
    if (issueDatabase[key].keywords.test(input)) {
      startDetailedQuestions(key);
      return "Got it! Let me ask you a few questions to get more details.\n\n" + issueDatabase[key].questions[0];
    }
  }

  return "I'm not totally sure what you mean. Try typing a number (1-15), the issue name, or type 'menu' to see all options!";
}

function startDetailedQuestions(issueType) {
  conversationState.awaitingDetails = true;
  conversationState.issueType = issueType;
  conversationState.questionsAsked = 0;
  conversationState.userResponses = [];
}

function resetConversation() {
  conversationState.awaitingDetails = false;
  conversationState.issueType = null;
  conversationState.questionsAsked = 0;
  conversationState.userResponses = [];
}
</script>

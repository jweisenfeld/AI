<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:'Segoe UI',sans-serif;
  background:linear-gradient(135deg,#000080,#0033cc);
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

.chat-container{
  width:100%;
  height:100vh;
  display:flex;
  flex-direction:column;
}

.header{
  padding:15px;
  background:#001a66;
  color:white;
  text-align:center;
  position:relative;
}

.link-bubble-left{
  position:absolute;
  left:15px;
  top:15px;
  background:#0084ff;
  padding:8px 14px;
  border-radius:20px;
  font-size:13px;
  cursor:pointer;
  text-decoration:none;
  color:white;
}

.link-bubble-left:hover{
  background:#006fd6;
}

.link-bubble-right{
  position:absolute;
  right:15px;
  top:15px;
  background:#0084ff;
  padding:8px 14px;
  border-radius:20px;
  font-size:13px;
  cursor:pointer;
  text-decoration:none;
  color:white;
}

.link-bubble-right:hover{
  background:#006fd6;
}

.chat-box{
  flex:1;
  padding:20px;
  overflow-y:auto;
  display:flex;
  flex-direction:column;
  gap:12px;
}

.message{
  max-width:75%;
  padding:12px 16px;
  border-radius:18px;
  font-size:14px;
  animation:fadeIn .2s ease;
  white-space:pre-wrap;
}

.bot{background:#0033cc;color:white;}
.user{background:#0084ff;color:white;align-self:flex-end;}

@keyframes fadeIn{
  from{opacity:0;transform:translateY(5px);}
  to{opacity:1;}
}

.input-area{
  display:flex;
  padding:12px;
  background:#001a66;
}

input{
  flex:1;
  padding:12px;
  border-radius:20px;
  border:none;
}

button{
  margin-left:10px;
  padding:12px 18px;
  border:none;
  border-radius:20px;
  background:#0084ff;
  color:white;
  cursor:pointer;
}
</style>
</head>

function addMessage(text,type){
  let msg=document.createElement("div");
  msg.className="message "+type;
  msg.textContent=text;
  chatBox.appendChild(msg);
  chatBox.scrollTop=chatBox.scrollHeight;
}

I help you figure out:
• What's wrong
• What you should do
• Who to contact

📝 How to use:
Type "menu" to see all 40 issues
or just type a number

I'll ask a few questions and guide you step-by-step.`,
"bot");
}

    "Signs":["📍 What is the exact location of the missing or damaged sign?","🚦 What type of sign is it (stop, speed limit, street name, warning)?","⚠️ Is the missing sign creating an immediate safety hazard?"],
    "Traffic Lights":["📍 What intersection is the traffic light located at?","🚦 What is the problem (completely out, stuck on one color, flashing)?","🕐 When did you first notice the issue?"],
    "Bus Issues":["🚌 What is the bus route number and approximate time of the issue?","❓ What happened (late arrival, overcrowding, driver behavior, accessibility)?","📅 Was this a one-time issue or has it happened before?"],
    "School Issues":["🏫 Which school and what is the nature of the issue?","👤 Who is involved (student, teacher, staff, facility)?","⚠️ Is this a safety concern or threat?"],
    "Parks":["📍 Which park and what specific area has the issue?","🛝 What is the problem (broken equipment, vandalism, unsafe conditions)?","⚠️ Is it an immediate safety hazard to children or visitors?"],
    "Fire Hazard":["📍 What is the exact address of the fire hazard?","🔥 What type of hazard is it (blocked exit, flammable materials, no smoke detectors, electrical)?","⚠️ Is there currently smoke, fire, or immediate danger?"],
    "Building Damage":["📍 What is the address of the damaged building?","🏚️ What type of damage is present (structural, roof, foundation, fire/water damage)?","⚠️ Does the building appear unsafe or at risk of collapse?"],
    "Animal Control":["📍 Where is the animal located?","🐕 What type of animal is it and what is it doing (stray, injured, aggressive)?","⚠️ Has anyone been bitten or threatened?"],
    "Suspicious Activity":["📍 Where is the activity taking place?","👤 Can you describe the individuals or vehicles involved?","🕐 Is the activity currently happening or did it recently occur?"],
    "Construction":["📍 Where is the construction taking place?","🏗️ What is the concern (noise, safety, no permit, road blockage)?","🕐 What time does the construction occur?"],
    "Broken Fence":["📍 Where is the broken fence located?","🏡 Is it on public or private property?","🏊 Is the fence a pool enclosure or safety barrier?"],
    "Road Damage":["📍 What is the exact road and location of the damage?","🚧 What type of damage (potholes, cracking, washout, sinkholes)?","⚠️ Is it blocking traffic or causing accidents?"],
    "Water Leak":["📍 What is the address or location of the water leak?","💧 Is it a main line break, a meter leak, or inside a home?","🌊 Is the water flooding the road or nearby structures?"],
    "Safety Hazard":["📍 What is the exact location of the safety hazard?","⚠️ What is the specific hazard (exposed wires, open hole, unstable structure, chemical spill)?","🚨 Is anyone currently in danger?"],
    "Package Theft":["📍 What is your address where the theft occurred?","📦 What was stolen and from where (front door, mailbox, porch)?","📹 Do you have any camera footage or witnesses?"],
    "Trespassing":["📍 What is the address where the trespassing is occurring?","👤 Can you describe the individual(s)?","🚨 Is the trespasser currently on the property?"],
    "Loitering":["📍 Where is the loitering occurring?","👤 How many people are involved and how are they behaving?","🕐 How long have they been there?"],
    "Bike Issues":["📍 Where did the bike issue occur?","🚲 What is the issue (stolen bike, accident, damaged bike lane)?","🕐 When did it happen?"],
    "Taxi Complaint":["🚕 What is the taxi company name and vehicle/medallion number?","❓ What is the complaint (overcharge, unsafe driving, rudeness, refused ride)?","🕐 When did this happen?"],
    "Utility Lines":["📍 Where are the utility lines located?","⚡ Are the lines downed, sparking, or sagging?","🚨 Are people or vehicles near the lines?"],
    "Broken Windows":["📍 What is the address of the broken window?","🏠 Is this a residential, commercial, or public building?","🔨 Was this caused by vandalism or weather?"],
    "Housing Complaint":["📍 What is the address of the housing issue?","🏠 What is the problem (mold, no heat, no water, pest infestation, structural damage)?","📅 How long have you or others been experiencing this issue?"],
    "Sanitation":["📍 What is the location of the sanitation issue?","🧹 What is the problem (missed trash pickup, overflowing bin, unsanitary conditions)?","⚠️ Is it near a food establishment or posing a health risk?"],
    "Air Quality":["📍 Where are you located and where is the source of the air quality issue?","💨 What do you notice (smoke, unusual smell, haze, chemical odor)?","🤒 Are you or others experiencing any health symptoms?"],
    "Other":["📍 What is the location of the issue?","❓ Can you describe what is happening in detail?","📅 When did this start and how often does it occur?"]
  };
  return q[issue] || ["📍 Where is it happening?","❓ How serious is it?","📅 When did it start?"];
}

function getSummary(issue, answers){
  const d = issueDetails[issue] || issueDetails["Other"];
  const questions = getQuestions(issue);

  let detailsBlock = "";
  questions.forEach((q,i)=>{
    if(answers[i]){
      detailsBlock += `${q}\n  → ${answers[i]}\n\n`;
    }
  });

  return `━━━━━━━━━━━━━━━━━━━━━━
📋 INCIDENT REPORT SUMMARY
━━━━━━━━━━━━━━━━━━━━━━

🔴 ISSUE TYPE: ${issue}
⚡ PRIORITY: ${d.priority}
🏢 DEPARTMENT: ${d.department}
⏰ URGENCY: ${d.urgency}

━━━━━━━━━━━━━━━━━━━━━━
📝 YOUR REPORT DETAILS:
━━━━━━━━━━━━━━━━━━━━━━

${detailsBlock}
━━━━━━━━━━━━━━━━━━━━━━
✅ RECOMMENDED STEPS:
━━━━━━━━━━━━━━━━━━━━━━
${d.steps.map((s,i)=>`${i+1}. ${s}`).join("\n")}

━━━━━━━━━━━━━━━━━━━━━━
📞 WHO TO CONTACT:
━━━━━━━━━━━━━━━━━━━━━━
${d.contacts.map(c=>`• ${c}`).join("\n")}

━━━━━━━━━━━━━━━━━━━━━━
💡 HELPFUL TIP:
━━━━━━━━━━━━━━━━━━━━━━
${d.tips}`;
}

function sendMessage(){
  let input=document.getElementById("userInput").value.trim();
  if(!input) return;

  addMessage(input,"user");
  document.getElementById("userInput").value="";

  if(/menu|help/i.test(input)){
    showMenu();
    return;
  }

  if(!state.waiting && !isNaN(input) && input>=1 && input<=40){
    state={waiting:true,issue:issues[input-1],step:0,answers:[]};
    addMessage("✅ Issue selected: "+state.issue+"\n\nI'll ask you a few questions to build your report.","bot");
    let q=getQuestions(state.issue);
    addMessage(q[0],"bot");
    return;
  }

  if(state.waiting){
    state.answers.push(input);
    state.step++;
    let q=getQuestions(state.issue);
    if(state.step<q.length){
      addMessage(q[state.step],"bot");
    }else{
      addMessage(getSummary(state.issue, state.answers),"bot");
      state={waiting:false,issue:null,step:0,answers:[]};
    }
    return;
  }

  addMessage("Type 'menu' or pick a number (1–40).","bot");
}

document.getElementById("userInput").addEventListener("keypress",e=>{
  if(e.key==="Enter") sendMessage();
});

welcome();

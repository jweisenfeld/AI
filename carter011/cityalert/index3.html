<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pasco Alert Bot</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:'Segoe UI',sans-serif;
  background:linear-gradient(135deg,#000080,#0033cc);
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

/* CHAT WRAPPER */
.chat-container{
  width:100%;
  height:100vh;
  display:flex;
  flex-direction:column;
}

/* HEADER */
.header{
  padding:15px;
  background:#001a66;
  color:white;
  text-align:center;
  position:relative;
}

/* LINK BUTTON */
.link-bubble{
  position:absolute;
  right:15px;
  top:15px;
  background:#0084ff;
  padding:8px 14px;
  border-radius:20px;
  font-size:13px;
  cursor:pointer;
}

/* CHAT BOX */
.chat-box{
  flex:1;
  padding:20px;
  overflow-y:auto;
  display:flex;
  flex-direction:column;
  gap:12px;
}

/* MESSAGES (WHITE BUBBLES) */
.message{
  max-width:75%;
  padding:12px 16px;
  border-radius:18px;
  font-size:14px;
  animation:fadeIn .2s ease;
  background:white;
  color:black;
  white-space:pre-line;
}

/* ALIGNMENT */
.bot{align-self:flex-start;}
.user{align-self:flex-end;}

/* ANIMATION */
@keyframes fadeIn{
  from{opacity:0;transform:translateY(5px);}
  to{opacity:1;}
}

/* INPUT AREA */
.input-area{
  display:flex;
  padding:12px;
  background:#001a66;
}

input{
  flex:1;
  padding:12px;
  border-radius:20px;
  border:none;
  outline:none;
}

button{
  margin-left:10px;
  padding:12px 18px;
  border:none;
  border-radius:20px;
  background:#0084ff;
  color:white;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="chat-container">

  <div class="header">
    🚨 Pasco Alert Bot
    <div class="link-bubble" onclick="window.open('https://forms.office.com')">
      Submit Report
    </div>
  </div>

  <div id="chatBox" class="chat-box"></div>

  <div class="input-area">
    <input id="userInput" placeholder="Type a number or describe an issue...">
    <button onclick="sendMessage()">Send</button>
  </div>

</div>

<script>

let state = {waiting:false, issue:null, step:0, answers:[]};

const issues = [
"Potholes","Noise","Streetlights","Flooding","Trash","Graffiti","Pests","Parking","Sidewalk","Trees",
"Power","Water Quality","Snow/Ice","Abandoned Car","Dumping","Signs","Traffic Lights","Bus Issues","School Issues","Parks",
"Fire Hazard","Building Damage","Animal Control","Suspicious Activity","Construction","Broken Fence","Road Damage","Water Leak","Safety Hazard","Package Theft",
"Trespassing","Loitering","Bike Issues","Taxi Complaint","Utility Lines","Broken Windows","Housing Complaint","Sanitation","Air Quality","Other"
];

function addMessage(text,type){
  let msg=document.createElement("div");
  msg.className="message "+type;
  msg.textContent=text;
  chatBox.appendChild(msg);
  chatBox.scrollTop=chatBox.scrollHeight;
}

/* WELCOME */
function welcome(){
  addMessage(
`👋 Welcome to Pasco Alert Bot!

I help you figure out:
• What’s wrong
• What you should do
• Who to contact

📝 How to use:
Type "menu" to see all 40 issues
or just type a number

I’ll guide you step-by-step.`,
"bot");
}

/* MENU */
function showMenu(){
  let text = "📋 ALL ISSUES:\n\n";
  issues.forEach((i,index)=>{
    text += (index+1) + ". " + i + "\n";
  });
  addMessage(text,"bot");
}

function getQuestions(){
  return [
    "Where is it happening?",
    "How serious is it?",
    "When did it start?"
  ];
}

function getAdvice(){
  return `📍 WHAT TO DO:
• Report to city services (311)
• Contact non-emergency police if needed
• Monitor the issue

📞 CONTACT:
• City Services: 311
• Emergency: 911 (if dangerous)`;
}

function sendMessage(){
  let input = document.getElementById("userInput").value.trim();
  if(!input) return;

  addMessage(input,"user");
  document.getElementById("userInput").value="";

  if(/menu|help/i.test(input)){
    showMenu();
    return;
  }

  if(!state.waiting && !isNaN(input) && input>=1 && input<=40){
    state = {
      waiting:true,
      issue:issues[input-1],
      step:0,
      answers:[]
    };

    addMessage("✅ " + state.issue,"bot");
    addMessage(getQuestions()[0],"bot");
    return;
  }

  if(state.waiting){
    state.answers.push(input);
    state.step++;

    let q = getQuestions();

    if(state.step < q.length){
      addMessage(q[state.step],"bot");
    } else {
      addMessage(
`📋 SUMMARY

Issue: ${state.issue}

Details:
• ${state.answers.join("\n• ")}

${getAdvice()}`,
"bot");

      state = {waiting:false,issue:null,step:0,answers:[]};
    }
    return;
  }

  addMessage("Type 'menu' or pick a number (1–40).","bot");
}

document.addEventListener("DOMContentLoaded",welcome);
document.addEventListener("DOMContentLoaded", function () {
  const input = document.getElementById("userInput");

  input.addEventListener("keydown", function (e) {
    if (e.key === "Enter") {
      e.preventDefault();
      sendMessage();
    }
  });
});
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ephesians Chapter Quiz</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Georgia', serif;
      background: #1a1a2e;
      color: #e8e0d0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
    }

    header {
      text-align: center;
      padding: 30px 0 20px;
    }
    header h1 {
      font-size: 2rem;
      color: #c9a84c;
      letter-spacing: 2px;
      text-transform: uppercase;
    }
    header p {
      color: #9a8c7a;
      margin-top: 6px;
      font-size: 0.95rem;
      font-style: italic;
    }

    #loading {
      text-align: center;
      padding: 60px 20px;
    }
    #loading p { color: #9a8c7a; margin-bottom: 16px; }
    #progress-bar-wrap {
      width: 260px;
      height: 6px;
      background: #2a2a4a;
      border-radius: 3px;
      margin: 0 auto;
      overflow: hidden;
    }
    #progress-bar {
      height: 100%;
      background: #c9a84c;
      border-radius: 3px;
      width: 0%;
      transition: width 0.3s;
    }

    #quiz {
      display: none;
      width: 100%;
      max-width: 720px;
    }

    /* Score bar */
    #scorebar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #16213e;
      border-radius: 10px;
      padding: 12px 20px;
      margin-bottom: 24px;
      font-size: 0.9rem;
      color: #9a8c7a;
    }
    #scorebar span { color: #c9a84c; font-weight: bold; font-size: 1rem; }
    #streak-display { font-size: 0.85rem; }

    /* Verse card */
    #verse-card {
      background: #16213e;
      border: 1px solid #2a2a4a;
      border-radius: 14px;
      padding: 36px 40px;
      margin-bottom: 28px;
      position: relative;
    }
    #verse-text {
      font-size: 1.25rem;
      line-height: 1.85;
      color: #e8e0d0;
      text-align: center;
    }
    #verse-text::before { content: '\201C'; }
    #verse-text::after  { content: '\201D'; }

    #verse-ref {
      margin-top: 18px;
      text-align: center;
      font-size: 1.05rem;
      color: #8a8aaa;
      font-style: italic;
      letter-spacing: 1px;
      min-height: 1.2em;
    }

    /* Question */
    #question {
      text-align: center;
      color: #c9a84c;
      font-size: 1.1rem;
      margin-bottom: 20px;
      letter-spacing: 0.5px;
    }

    /* Chapter grid — 6 chapter buttons */
    #chapter-grid {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 10px;
      margin-bottom: 24px;
    }

    /* Chapter buttons */
    .ch-btn {
      background: #0f3460;
      border: 1px solid #1e4d8c;
      color: #b0c4e0;
      padding: 14px 8px;
      border-radius: 10px;
      font-size: 1rem;
      font-family: Georgia, serif;
      cursor: pointer;
      transition: all 0.15s;
      text-align: center;
    }
    .ch-btn:hover:not(:disabled) {
      background: #1a5490;
      border-color: #c9a84c;
      color: #fff;
      transform: translateY(-1px);
    }
    .ch-btn:disabled { cursor: default; opacity: 0.7; }
    .ch-btn.correct {
      background: #1a4a2e;
      border-color: #4caf7a;
      color: #7ddf9c;
    }
    .ch-btn.wrong {
      background: #4a1a1a;
      border-color: #c04040;
      color: #e07070;
    }

    /* Feedback */
    #feedback {
      display: none;
      background: #16213e;
      border-radius: 12px;
      padding: 20px 24px;
      margin-bottom: 20px;
      border-left: 4px solid #c9a84c;
    }
    #feedback.correct-fb { border-left-color: #4caf7a; }
    #feedback.wrong-fb   { border-left-color: #c04040; }

    #feedback-result {
      font-size: 1.05rem;
      font-weight: bold;
      margin-bottom: 8px;
    }
    .correct-fb #feedback-result { color: #7ddf9c; }
    .wrong-fb   #feedback-result { color: #e07070; }

    #feedback-theme {
      color: #b0a090;
      font-size: 1.05rem;
      line-height: 1.6;
    }
    #feedback-theme strong { color: #c9a84c; }

    /* Next button */
    #next-btn {
      display: none;
      width: 100%;
      padding: 16px;
      background: #c9a84c;
      color: #1a1a2e;
      border: none;
      border-radius: 10px;
      font-size: 1.05rem;
      font-family: Georgia, serif;
      font-weight: bold;
      cursor: pointer;
      letter-spacing: 1px;
      transition: background 0.15s;
    }
    #next-btn:hover { background: #e0bf60; }

    /* Footer */
    footer {
      margin-top: 40px;
      color: #4a4a6a;
      font-size: 0.78rem;
      text-align: center;
      padding-bottom: 20px;
    }
    footer a { color: #5a5a8a; text-decoration: none; }

    @media (max-width: 500px) {
      #verse-card { padding: 24px 20px; }
      #verse-text { font-size: 1.05rem; }
      #chapter-grid { grid-template-columns: repeat(3, 1fr); gap: 7px; }
      .ch-btn { padding: 12px 4px; font-size: 0.9rem; }
    }

    /* Pie chart — fixed top-right */
    #pie-wrap {
      position: fixed;
      top: 14px;
      right: 18px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      z-index: 100;
    }
    #pie-arc {
      transition: stroke-dasharray 0.35s ease;
    }
    #pie-count {
      font-size: 0.72rem;
      color: #6a6a8a;
      letter-spacing: 0.5px;
      font-family: Georgia, serif;
    }

    /* Completion screen */
    #completion {
      display: none;
      width: 100%;
      max-width: 720px;
    }
    #comp-card {
      background: #16213e;
      border: 1px solid #2a2a4a;
      border-radius: 14px;
      padding: 52px 40px;
      text-align: center;
    }
    #comp-card h2 {
      color: #c9a84c;
      font-size: 1.9rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 18px;
    }
    #comp-verse-count {
      color: #e8e0d0;
      font-size: 1.15rem;
      margin-bottom: 10px;
    }
    #comp-session-score {
      color: #9a8c7a;
      font-size: 1rem;
      margin-bottom: 36px;
    }
    #comp-btn {
      padding: 16px 44px;
      background: #c9a84c;
      color: #1a1a2e;
      border: none;
      border-radius: 10px;
      font-size: 1.05rem;
      font-family: Georgia, serif;
      font-weight: bold;
      cursor: pointer;
      letter-spacing: 1px;
      transition: background 0.15s;
    }
    #comp-btn:hover { background: #e0bf60; }
  </style>
</head>
<body>

<header>
  <h1>Ephesians</h1>
  <p>Which chapter is this verse from?</p>
</header>

<!-- Pie chart: verses covered this round -->
<div id="pie-wrap" title="Verses covered this round">
  <svg width="58" height="58" viewBox="0 0 58 58">
    <circle cx="29" cy="29" r="23" fill="#16213e" stroke="#2a2a4a" stroke-width="7"/>
    <circle id="pie-arc" cx="29" cy="29" r="23" fill="none" stroke="#4caf7a" stroke-width="7"
      stroke-dasharray="0 144.5" transform="rotate(-90 29 29)"/>
  </svg>
  <div id="pie-count">0 / 0</div>
</div>

<div id="loading">
  <p id="loading-msg">Loading the book of Ephesians…</p>
  <div id="progress-bar-wrap"><div id="progress-bar"></div></div>
</div>

<div id="quiz">
  <div id="scorebar">
    <div>Score: <span id="score-display">0 / 0</span></div>
    <div id="streak-display"></div>
  </div>

  <div id="verse-card">
    <div id="verse-text"></div>
    <div id="verse-ref"></div>
  </div>

  <div id="question">Which chapter is this verse from?</div>

  <div id="chapter-grid"></div>

  <div id="feedback">
    <div id="feedback-result"></div>
    <div id="feedback-theme"></div>
  </div>

  <button id="next-btn" onclick="nextVerse()">Next Verse &rarr;</button>
</div>

<!-- Completion screen shown when all verses in the deck have been answered -->
<div id="completion">
  <div id="comp-card">
    <h2>Round Complete!</h2>
    <p id="comp-verse-count"></p>
    <p id="comp-session-score"></p>
    <button id="comp-btn" onclick="startNextRound()">Start Next Round &rarr;</button>
  </div>
</div>

<footer>
  World English Bible (WEB) &mdash; Public Domain
</footer>

<script>
const CHAPTER_THEMES = {
  1: "Every spiritual blessing in Christ; chosen before creation; sealed with the Spirit; prayer for wisdom and revelation",
  2: "Dead in sin, made alive by grace; saved through faith not works; Gentiles and Jews united as one body in Christ",
  3: "The mystery revealed: Gentiles are fellow heirs; Paul's prayer for strength and fullness; God able to do far more",
  4: "Walk worthy of your calling; one body, one Spirit, one Lord; gifts for building up the church; put off the old self",
  5: "Walk in love and light; be filled with the Spirit; psalms and thanksgiving; wives and husbands in Christ",
  6: "Children and parents; servants and masters; the armor of God; prayer for boldness; final blessing",
};

// Verses shorter than 50 chars get merged with the next verse in the same chapter
// so every verse is included and has enough context to quiz on.
function groupShortVerses(raw) {
  const result = [];
  let i = 0;
  while (i < raw.length) {
    const v = raw[i];
    if (v.t.length < 50 && i + 1 < raw.length && raw[i + 1].c === v.c) {
      const next = raw[i + 1];
      result.push({ chapter: v.c, verseStart: v.v, verseEnd: next.v, text: v.t + ' ' + next.t });
      i += 2;
    } else {
      result.push({ chapter: v.c, verseStart: v.v, verseEnd: null, text: v.t });
      i++;
    }
  }
  return result;
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// Pie chart: r=23, circumference = 2π×23 ≈ 144.51
const PIE_CIRC = 2 * Math.PI * 23;

function updatePie() {
  const n = deckIndex;          // verses answered so far this round
  const t = deck.length;
  const arc = t > 0 ? (n / t) * PIE_CIRC : 0;
  document.getElementById('pie-arc')
    .setAttribute('stroke-dasharray', `${arc.toFixed(2)} ${PIE_CIRC.toFixed(2)}`);
  document.getElementById('pie-count').textContent = `${n} / ${t}`;
}

let allVerses = [];
let deck = [];
let deckIndex = 0;
let currentVerse = null;
let correct = 0;
let total = 0;
let streak = 0;

async function loadEphesians() {
  let raw;
  try {
    const res = await fetch('data.json');
    if (!res.ok) throw new Error(res.status);
    raw = await res.json();
  } catch (e) {
    document.getElementById('loading-msg').textContent =
      'Could not load data.json. Please refresh or check your connection.';
    return;
  }

  allVerses = groupShortVerses(raw);
  deck = shuffle(allVerses);
  deckIndex = 0;

  document.getElementById('progress-bar').style.width = '100%';
  setTimeout(startQuiz, 150);
}

function startQuiz() {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('quiz').style.display = 'block';
  buildGrid();
  updatePie();
  nextVerse();
}

function buildGrid() {
  const grid = document.getElementById('chapter-grid');
  grid.innerHTML = '';
  for (let ch = 1; ch <= 6; ch++) {
    const btn = document.createElement('button');
    btn.className = 'ch-btn';
    btn.textContent = ch;
    btn.dataset.ch = ch;
    btn.addEventListener('click', () => guess(ch, btn));
    grid.appendChild(btn);
  }
}

function nextVerse() {
  // All verses answered — show completion screen instead of silent reshuffle
  if (deckIndex >= deck.length) {
    showCompletion();
    return;
  }
  currentVerse = deck[deckIndex++];

  document.getElementById('verse-text').textContent = currentVerse.text;
  document.getElementById('verse-ref').textContent = '';
  document.getElementById('feedback').style.display = 'none';
  document.getElementById('next-btn').style.display = 'none';

  document.querySelectorAll('.ch-btn').forEach(b => {
    b.disabled = false;
    b.className = 'ch-btn';
  });
}

function showCompletion() {
  document.getElementById('quiz').style.display = 'none';
  document.getElementById('completion').style.display = 'block';
  const pct = total ? Math.round(correct / total * 100) : 0;
  document.getElementById('comp-verse-count').textContent =
    `You've seen all ${deck.length} verses in Ephesians.`;
  document.getElementById('comp-session-score').textContent =
    `Session score: ${correct} / ${total} (${pct}%)`;
}

function startNextRound() {
  deck = shuffle(allVerses);
  deckIndex = 0;
  document.getElementById('completion').style.display = 'none';
  document.getElementById('quiz').style.display = 'block';
  updatePie();
  nextVerse();
}

function verseRef(v) {
  const base = `Ephesians ${v.chapter}:${v.verseStart}`;
  return v.verseEnd ? `${base}\u2013${v.verseEnd}` : base;
}

function guess(ch, btn) {
  const answer = currentVerse.chapter;
  total++;

  document.querySelectorAll('.ch-btn').forEach(b => { b.disabled = true; });

  document.getElementById('verse-ref').textContent = verseRef(currentVerse);

  if (ch === answer) {
    correct++;
    streak++;
    btn.className = 'ch-btn correct';
    showFeedback(true, answer);
  } else {
    streak = 0;
    btn.className = 'ch-btn wrong';
    document.querySelector(`.ch-btn[data-ch="${answer}"]`).className = 'ch-btn correct';
    showFeedback(false, answer);
  }

  updateScore();
  updatePie();
  document.getElementById('next-btn').style.display = 'block';
}

function showFeedback(isCorrect, chapter) {
  const fb = document.getElementById('feedback');
  fb.style.display = 'block';
  fb.className = isCorrect ? 'correct-fb' : 'wrong-fb';
  document.getElementById('feedback-result').textContent =
    isCorrect ? '✓ Correct!' : `✗ That was Ephesians ${chapter}`;
  document.getElementById('feedback-theme').innerHTML =
    `<strong>Chapter ${chapter} theme:</strong> ${CHAPTER_THEMES[chapter]}`;
}

function updateScore() {
  document.getElementById('score-display').textContent = `${correct} / ${total}`;
  const pct = total ? Math.round(correct / total * 100) : 0;
  let streakText = '';
  if (streak >= 3) streakText = `\uD83D\uDD25 ${streak} in a row!`;
  else if (streak === 2) streakText = '2 in a row';
  document.getElementById('streak-display').textContent =
    total ? `${pct}%${streakText ? ' \u00B7 ' + streakText : ''}` : '';
}

// Kick off
loadEphesians();
</script>
</body>
</html>

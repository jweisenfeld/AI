<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Romans Reviewer - NIV Edition</title>
   <style>
        :root {
            --primary: #5c8d75; /* Faithful/Olive style */
            --secondary: #f4e4d0;
            --accent: #d9534f;
            --text: #333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f9f9f9;
            color: var(--text);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* Header area */
        header {
            background-color: #333;
            color: #fff;
            width: 100%;
            padding: 15px 0;
            text-align: center;
            position: fixed;
            top: 0;
            z-index: 100;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        #stats-bar {
            background-color: #fff;
            border-bottom: 1px solid #ccc;
            padding: 10px 0;
            margin-top: 50px;
            width: 90%;
            max-width: 800px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-radius: 5px;
        }

        #stats-bar h1 {
            font-size: 1.2rem;
            color: #5c8d75;
            margin: 0;
        }

        /* Card Container */
        .container {
            max-width: 800px;
            width: 90%;
            margin-top: 100px; /* Account for header */
            text-align: center;
            padding-bottom: 50px;
        }

        .card {
            background: white;
            padding: 2rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            border-radius: 10px;
            border-top: 5px solid var(--primary);
        }

        /* The Verse Display */
        .verse-reference {
            font-size: 0.8rem;
            text-transform: uppercase;
            color: #888;
            margin-bottom: 5px;
            font-weight: bold;
        }

        .verse-text {
            font-size: 1.5rem;
            font-weight: 600;
            font-style: italic;
            margin: 1rem 0;
        }

        /* Input Area */
        #input-area {
            margin-top: 20px;
        }

        input[type="number"] {
            padding: 10px;
            font-size: 1.2rem;
            width: 80px;
            text-align: center;
            border: 2px solid #ddd;
            border-radius: 5px;
        }

        .game-info {
            font-size: 0.9rem;
            color: #666;
            margin-bottom: 10px;
        }

        /* Feedback Styling */
        #feedback-area, #context-area {
            display: none; /* Hidden by default */
            margin-top: 20px;
            padding: 15px;
            border-radius: 5px;
            animation: fadeIn 0.5s;
        }

        .correct {
            background-color: #d4edda;
            border: 1px solid #c3e6cb;
            color: #155724;
        }

        .incorrect {
            background-color: #f8d7da;
            border: 1px solid #f5c6cd;
            color: #721c24;
        }

        .multi-choice {
            font-size: 1.1rem;
        }

        .explanation {
            font-size: 0.95rem;
            font-style: italic;
            margin-top: 10px;
            color: #555;
        }

        /* Next Button */
        #next-btn {
            display: none;
            margin-top: 25px;
            padding: 10px 25px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: bold;
            transition: background 0.2s;
        }

        #next-btn:hover {
            background-color: #4a735f;
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .fade-in {
            animation: fadeIn 0.5s;
        }

    </style>
</head>
<body>

   <header>
       <h1>Bible Survey: Book of Romans (NIV)</h1>
       <div id="stats-bar">
           <div id="loader">Loading Romans...</div>
           <div id="progress">Start |<span id="score">0</span>/31 Chapters</div>
        </div>
    </header>

   <div class="container">
       <div id="game-card" class="card">
           <div id="loader-text"

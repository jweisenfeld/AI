<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Name Flashcards</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #1a1a2e;
      color: #eee;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 16px;
    }

    h1 {
      font-size: clamp(1.2rem, 4vw, 1.8rem);
      margin-bottom: 8px;
      color: #a8d8ea;
      letter-spacing: 1px;
    }

    #status {
      font-size: 0.85rem;
      color: #888;
      margin-bottom: 16px;
    }

    /* ── Card ── */
    #card-area {
      width: 100%;
      max-width: 520px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
    }

    #progress-bar-wrap {
      width: 100%;
      height: 6px;
      background: #333;
      border-radius: 3px;
      overflow: hidden;
    }
    #progress-bar {
      height: 100%;
      background: #a8d8ea;
      transition: width 0.3s ease;
      width: 0%;
    }

    #card {
      width: 100%;
      background: #16213e;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
      cursor: pointer;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    #photo-wrap {
      width: 100%;
      aspect-ratio: 4/3;
      background: #0f3460;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    #photo {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    #photo-placeholder {
      color: #555;
      font-size: 1rem;
      text-align: center;
      padding: 20px;
    }

    #name-reveal {
      padding: 18px 20px;
      text-align: center;
      min-height: 72px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 4px;
      border-top: 1px solid #0f3460;
    }

    #name-text {
      font-size: clamp(1.3rem, 5vw, 2rem);
      font-weight: 700;
      color: #a8d8ea;
      letter-spacing: 0.5px;
      opacity: 0;
      transition: opacity 0.25s ease;
    }
    #name-text.visible { opacity: 1; }

    #church-text {
      font-size: clamp(0.8rem, 3vw, 1rem);
      color: #7a9bb5;
      font-style: italic;
      opacity: 0;
      transition: opacity 0.25s ease 0.1s;
    }
    #church-text.visible { opacity: 1; }

    #tap-hint {
      font-size: 0.8rem;
      color: #556;
      transition: opacity 0.2s;
    }

    /* ── Controls ── */
    #controls {
      width: 100%;
      max-width: 520px;
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
    }

    button {
      padding: 11px 22px;
      border: none;
      border-radius: 10px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.1s, opacity 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    button:active { transform: scale(0.96); opacity: 0.85; }

    #btn-reveal  { background: #0f3460; color: #a8d8ea; flex: 1; min-width: 110px; }
    #btn-next    { background: #a8d8ea; color: #1a1a2e; flex: 1; min-width: 110px; }
    #btn-prev    { background: #2a2a4a; color: #aaa;    min-width: 60px; }
    #btn-shuffle { background: #2a2a4a; color: #aaa;    min-width: 60px; }

    /* ── Mode toggle ── */
    #mode-row {
      width: 100%;
      max-width: 520px;
      display: flex;
      gap: 8px;
      justify-content: center;
    }
    .mode-btn {
      padding: 7px 14px;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 600;
      background: #2a2a4a;
      color: #888;
      border: 2px solid transparent;
    }
    .mode-btn.active {
      border-color: #a8d8ea;
      color: #a8d8ea;
    }

    /* ── Counter ── */
    #counter {
      font-size: 0.85rem;
      color: #556;
    }

    /* ── Loading / Error ── */
    #loading {
      margin-top: 60px;
      text-align: center;
      color: #556;
    }
    #error-msg {
      margin-top: 40px;
      background: #3a1a1a;
      border: 1px solid #a33;
      border-radius: 10px;
      padding: 20px;
      max-width: 480px;
      color: #f88;
      display: none;
    }
    #error-msg code {
      background: #2a1010;
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 0.85rem;
    }

    /* ── CSV upload fallback ── */
    #upload-area {
      margin-top: 16px;
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }
    #upload-area label {
      background: #0f3460;
      color: #a8d8ea;
      padding: 10px 20px;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 600;
    }
    #csv-file { display: none; }
  </style>
</head>
<body>

<h1>Name Flashcards</h1>
<div id="status">Loading…</div>

<div id="loading">Loading CSV…</div>

<div id="error-msg">
  <strong>Could not load names.csv</strong><br><br>
  Make sure <code>names/photos/names.csv</code> exists with columns:<br>
  <code>filename,fullname</code><br><br>
  Or load a CSV file manually:<br>
  <div id="upload-area">
    <label for="csv-file">Choose names.csv</label>
    <input type="file" id="csv-file" accept=".csv,text/csv">
  </div>
</div>

<div id="card-area" style="display:none">
  <div id="progress-bar-wrap"><div id="progress-bar"></div></div>

  <div id="mode-row">
    <button class="mode-btn active" id="mode-flash" onclick="setMode('flash')">Flashcard</button>
    <button class="mode-btn" id="mode-quiz"  onclick="setMode('quiz')">Quiz</button>
  </div>

  <div id="card" onclick="handleCardTap()">
    <div id="photo-wrap">
      <img id="photo" src="" alt="Student photo" style="display:none">
      <div id="photo-placeholder">No image</div>
    </div>
    <div id="name-reveal">
      <div id="name-text"></div>
      <div id="church-text"></div>
      <div id="tap-hint">Tap to reveal name</div>
    </div>
  </div>

  <!-- Quiz mode answer input -->
  <div id="quiz-input-area" style="display:none; width:100%; max-width:520px;">
    <input id="quiz-answer" type="text" placeholder="Type the name…"
      style="width:100%; padding:12px 16px; border-radius:10px; border:2px solid #0f3460;
             background:#16213e; color:#eee; font-size:1rem; outline:none;"
      oninput="checkQuizAnswer()" autocomplete="off" autocorrect="off" autocapitalize="words">
    <div id="quiz-feedback" style="text-align:center; margin-top:8px; font-size:0.9rem; min-height:1.2em;"></div>
  </div>

  <div id="controls">
    <button id="btn-prev"    onclick="go(-1)">&#8592;</button>
    <button id="btn-reveal"  onclick="revealName()">Reveal</button>
    <button id="btn-next"    onclick="go(1)">Next &#8594;</button>
    <button id="btn-shuffle" onclick="shuffle()" title="Shuffle">&#x21BA;</button>
  </div>

  <div id="counter"></div>
</div>

<script>
  // ── State ──────────────────────────────────────────────
  let cards = [];        // [{filename, fullname}]
  let order = [];        // indices into cards[]
  let pos   = 0;         // current index into order[]
  let revealed = false;
  let mode = 'flash';    // 'flash' | 'quiz'
  const PHOTO_DIR = 'photos/';

  // ── Load CSV ───────────────────────────────────────────
  async function loadCSV(text) {
    const lines = text.trim().split('\n');
    const header = lines[0].toLowerCase();
    const startLine = header.includes('filename') ? 1 : 0;
    cards = [];
    for (let i = startLine; i < lines.length; i++) {
      const row = lines[i].trim();
      if (!row) continue;
      // Handle quoted fields
      const cols = row.match(/(".*?"|[^,]+)/g) || [];
      const filename   = (cols[0] || '').replace(/^"|"$/g, '').trim();
      const fullname   = (cols[1] || '').replace(/^"|"$/g, '').trim();
      const churchname = (cols[2] || '').replace(/^"|"$/g, '').trim();
      if (filename && fullname) cards.push({ filename, fullname, churchname });
    }
    if (cards.length === 0) throw new Error('No valid rows found in CSV');
    initDeck();
  }

  function initDeck() {
    order = cards.map((_, i) => i);
    pos = 0;
    showCard();
    document.getElementById('card-area').style.display = 'flex';
    document.getElementById('loading').style.display = 'none';
    document.getElementById('error-msg').style.display = 'none';
    document.getElementById('status').textContent = `${cards.length} students loaded`;
  }

  // ── Fetch CSV from server ──────────────────────────────
  fetch('photos/names.csv')
    .then(r => { if (!r.ok) throw new Error(r.status); return r.text(); })
    .then(loadCSV)
    .catch(() => {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('error-msg').style.display = 'block';
      document.getElementById('upload-area').style.display = 'flex';
      document.getElementById('status').textContent = 'No CSV found';
    });

  // Manual CSV upload fallback
  document.getElementById('csv-file').addEventListener('change', e => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => loadCSV(ev.target.result).catch(err => alert('CSV error: ' + err));
    reader.readAsText(file);
  });

  // ── Display ────────────────────────────────────────────
  function showCard() {
    if (cards.length === 0) return;
    revealed = false;
    const card = cards[order[pos]];

    // Photo
    const img = document.getElementById('photo');
    const ph  = document.getElementById('photo-placeholder');
    img.style.display = 'none';
    ph.style.display  = 'flex';
    img.onload  = () => { img.style.display = 'block'; ph.style.display = 'none'; };
    img.onerror = () => { img.style.display = 'none';  ph.style.display = 'flex'; ph.textContent = 'Photo not found'; };
    img.src = PHOTO_DIR + card.filename;

    // Name
    const nameEl = document.getElementById('name-text');
    nameEl.textContent = card.fullname;
    nameEl.classList.remove('visible');
    const churchEl = document.getElementById('church-text');
    churchEl.textContent = '';
    churchEl.classList.remove('visible');

    // Hint / quiz
    updateModeUI();

    // Progress
    document.getElementById('progress-bar').style.width = ((pos + 1) / order.length * 100) + '%';
    document.getElementById('counter').textContent = `${pos + 1} / ${order.length}`;
  }

  function updateModeUI() {
    const hint    = document.getElementById('tap-hint');
    const quizArea = document.getElementById('quiz-input-area');
    const revBtn  = document.getElementById('btn-reveal');
    if (mode === 'flash') {
      hint.style.display = '';
      hint.textContent = revealed ? '' : 'Tap to reveal name';
      quizArea.style.display = 'none';
      revBtn.style.display = '';
    } else {
      hint.style.display = 'none';
      quizArea.style.display = '';
      revBtn.style.display = 'none';
      document.getElementById('quiz-answer').value = '';
      document.getElementById('quiz-feedback').textContent = '';
      document.getElementById('quiz-answer').style.borderColor = '#0f3460';
      if (!revealed) document.getElementById('quiz-answer').focus();
    }
  }

  function revealName() {
    revealed = true;
    const card = cards[order[pos]];
    document.getElementById('name-text').classList.add('visible');
    const churchEl = document.getElementById('church-text');
    churchEl.textContent = card.churchname || '';
    if (card.churchname) churchEl.classList.add('visible');
    document.getElementById('tap-hint').textContent = '';
  }

  function handleCardTap() {
    if (mode !== 'flash') return;
    if (!revealed) revealName();
    else go(1);
  }

  // ── Quiz mode ──────────────────────────────────────────
  function normalize(s) {
    return s.toLowerCase().replace(/[^a-z ]/g, '').trim();
  }

  function checkQuizAnswer() {
    if (revealed) return;
    const card = cards[order[pos]];
    const answer = document.getElementById('quiz-answer').value;
    const fb = document.getElementById('quiz-feedback');
    const inp = document.getElementById('quiz-answer');

    if (normalize(answer) === normalize(card.fullname)) {
      revealed = true;
      document.getElementById('name-text').classList.add('visible');
      inp.style.borderColor = '#4caf50';
      fb.style.color = '#4caf50';
      fb.textContent = 'Correct!';
      setTimeout(() => go(1), 900);
    } else if (answer.length >= card.fullname.length) {
      inp.style.borderColor = '#f44';
      fb.style.color = '#f88';
      fb.textContent = 'Not quite — keep trying';
    } else {
      inp.style.borderColor = '#0f3460';
      fb.textContent = '';
    }
  }

  // ── Navigation ─────────────────────────────────────────
  function go(delta) {
    pos = (pos + delta + order.length) % order.length;
    showCard();
  }

  function shuffle() {
    for (let i = order.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [order[i], order[j]] = [order[j], order[i]];
    }
    pos = 0;
    showCard();
  }

  // ── Mode toggle ────────────────────────────────────────
  function setMode(m) {
    mode = m;
    document.getElementById('mode-flash').classList.toggle('active', m === 'flash');
    document.getElementById('mode-quiz').classList.toggle('active',  m === 'quiz');
    showCard();
  }

  // Keyboard shortcuts
  document.addEventListener('keydown', e => {
    if (mode === 'quiz' && document.activeElement === document.getElementById('quiz-answer')) return;
    if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); go(1); }
    if (e.key === 'ArrowLeft')                    { e.preventDefault(); go(-1); }
    if (e.key === 'Enter' || e.key === 'r')       revealName();
  });
</script>
</body>
</html>

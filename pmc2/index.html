<!DOCTYPE html>
<html lang="en">
<head>
    <!-- KaTeX for LaTeX/math rendering -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"
        onload="window.katexReady = true;"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pasco Municipal Code — Claude AI Reference</title>
    <style>
        :root { --primary: #1e3d2f; --bg: #f5f6f8; --border: #dadce0; --text: #202124; --keyboard-offset: 0px; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); height: 100vh; display: flex; flex-direction: column; margin: 0; color: var(--text); }
        .header { background: white; padding: 10px 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .main-container { flex: 1; display: flex; overflow: hidden; justify-content: center; }
        .chat-area { width: 100%; max-width: 900px; background: white; display: flex; flex-direction: column; border-inline: 1px solid var(--border); }
        .messages { flex: 1; overflow-y: auto; padding: 20px; padding-bottom: calc(20px + var(--keyboard-offset)); }
        .message { margin-bottom: 20px; display: flex; flex-direction: column; }
        .bubble { padding: 12px 18px; border-radius: 18px; max-width: 85%; line-height: 1.5; font-size: 0.95rem; }
        .user .bubble { background: var(--primary); color: white; align-self: flex-end; border-bottom-right-radius: 4px; }
        .assistant .bubble { background: #f1f3f4; align-self: flex-start; border-bottom-left-radius: 4px; }
        .input-area {
            padding: 20px 20px calc(20px + var(--keyboard-offset) + env(safe-area-inset-bottom, 0px));
            border-top: 1px solid var(--border);
        }
        .input-group { display: flex; gap: 10px; align-items: flex-start; }
        textarea { flex: 1; height: 60px; padding: 12px; border: 1px solid var(--border); border-radius: 8px; resize: none; font-family: inherit; }
        .btn { background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        #image-previews img { height: 50px; border-radius: 4px; border: 1px solid var(--border); margin-right: 5px; }
        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
        .thinking-bubble { font-style: italic; color: #888; animation: blink 1.2s ease-in-out infinite; }
        .ttfb-tag { font-size: 0.7em; color: #999; margin-top: 4px; align-self: flex-start; padding: 0 4px; }
        .meta-tags { display: flex; gap: 6px; margin-top: 4px; align-self: flex-start; flex-wrap: wrap; }
        .cache-tag { font-size: 0.7em; padding: 1px 6px; border-radius: 10px; font-weight: 600; }
        .cache-tag.hit   { background: #e6f4ea; color: #1e8e3e; border: 1px solid #a8d5b5; }
        .cache-tag.write { background: #fef3c7; color: #92400e; border: 1px solid #fde68a; }
        .cache-tag.miss  { background: #f1f3f4; color: #80868b; border: 1px solid #dadce0; }
        .convo-banner { display: none; margin: 0 20px 10px; padding: 9px 14px; border-radius: 8px; font-size: 0.85em; line-height: 1.4; }
        .convo-banner.warn { background: #fef9e7; color: #7d5a00; border: 1px solid #f5c518; }
        .convo-banner.stop { background: #fce8e6; color: #c0392b; border: 1px solid #f28b82; }
        .convo-banner button.dismiss { float: right; background: none; border: none; cursor: pointer; font-size: 1em; line-height: 1; color: inherit; opacity: 0.6; margin-left: 8px; }
        .convo-banner button.dismiss:hover { opacity: 1; }
        .upload-btn { background: none; border: 1px solid var(--border); border-radius: 6px; cursor: pointer; padding: 6px 8px; display: flex; align-items: center; justify-content: center; color: #5f6368; position: relative; }
        .upload-btn:hover { background: #f1f3f4; border-color: #aaa; }
        .upload-btn svg { width: 20px; height: 20px; }
        .upload-btn::after { content: attr(data-tooltip); position: absolute; bottom: 110%; left: 50%; transform: translateX(-50%); background: #333; color: #fff; padding: 4px 8px; border-radius: 4px; font-size: 0.75em; white-space: nowrap; pointer-events: none; opacity: 0; transition: opacity 0.15s; }
        .upload-btn:hover::after { opacity: 1; }
        .copy-btn { background: none; border: 1px solid var(--border); border-radius: 6px; cursor: pointer; padding: 6px 8px; display: flex; align-items: center; justify-content: center; color: #5f6368; font-size: 0.78em; gap: 4px; white-space: nowrap; position: relative; }
        .copy-btn:hover { background: #f1f3f4; border-color: #aaa; }
        .copy-btn svg { width: 16px; height: 16px; }
        .copy-btn::after { content: attr(data-tooltip); position: absolute; bottom: 110%; left: 50%; transform: translateX(-50%); background: #333; color: #fff; padding: 4px 8px; border-radius: 4px; font-size: 0.75em; white-space: nowrap; pointer-events: none; opacity: 0; transition: opacity 0.15s; }
        .copy-btn:hover::after { opacity: 1; }

        /* ── Rich content inside assistant bubbles ── */
        .bubble h1, .bubble h2, .bubble h3, .bubble h4 { margin: 14px 0 6px 0; }
        .bubble h1 { font-size: 1.25rem; }
        .bubble h2 { font-size: 1.1rem; }
        .bubble h3 { font-size: 1.0rem; }
        .bubble h4 { font-size: 0.95rem; font-weight: 600; color: #444; }
        .bubble p { margin: 6px 0; }
        .bubble ul, .bubble ol { margin: 6px 0; padding-left: 22px; }
        .bubble li { margin: 3px 0; }
        .bubble ul.nested { margin: 3px 0 3px 18px; }
        .bubble li.task-item { list-style: none; margin-left: -18px; }
        .bubble li.task-item.checked { color: #888; text-decoration: line-through; }
        .bubble a { color: var(--primary); text-decoration: underline; }
        .bubble a:hover { opacity: 0.8; }
        .bubble del { color: #888; text-decoration: line-through; }
        .bubble hr { border: none; border-top: 1px solid var(--border); margin: 12px 0; }
        .bubble blockquote { border-left: 4px solid var(--primary); margin: 8px 0; padding: 6px 14px; background: #e8f5ee; border-radius: 0 8px 8px 0; color: #1a5c38; font-style: italic; }
        .bubble table { border-collapse: collapse; margin: 10px 0; width: 100%; font-size: 0.9rem; }
        .bubble th, .bubble td { border: 1px solid var(--border); padding: 7px 11px; text-align: left; }
        .bubble th { background: #e8f5ee; font-weight: 600; color: #1a5c38; }
        .bubble tr:nth-child(even) td { background: #f8f9fa; }
        .bubble pre { background: #1e1e1e; color: #d4d4d4; padding: 12px 14px; border-radius: 8px; overflow-x: auto; margin: 10px 0; font-size: 0.85rem; font-family: 'Fira Code', 'Consolas', monospace; }
        .bubble code { background: rgba(0,0,0,0.08); padding: 2px 5px; border-radius: 4px; font-size: 0.88em; font-family: 'Fira Code', 'Consolas', monospace; }
        .bubble pre code { background: none; padding: 0; color: inherit; }
        .bubble sup { font-size: 0.75em; vertical-align: super; }
        .bubble sub { font-size: 0.75em; vertical-align: sub; }
        .bubble .katex-display { margin: 10px 0; overflow-x: auto; }
        /* User bubble overrides — readable on dark green background */
        .user .bubble a { color: #b7e4c7; }
        .user .bubble code { background: rgba(255,255,255,0.2); }
        .user .bubble blockquote { background: rgba(255,255,255,0.15); border-left-color: white; color: white; }
        .user .bubble th { background: rgba(255,255,255,0.2); color: white; }
        .user .bubble pre { background: rgba(0,0,0,0.3); }

        @media (max-width: 768px) {
            .messages { padding: 14px; padding-bottom: calc(14px + var(--keyboard-offset)); }
            .input-area { padding: 12px 12px calc(16px + var(--keyboard-offset) + env(safe-area-inset-bottom, 0px)); }
            .input-group { gap: 8px; }
            textarea { height: 56px; }
        }
    </style>
</head>

<body>
    <header class="header">
        <div style="font-weight:bold; color:var(--primary); font-size:1.05em;">
            Pasco Municipal Code &nbsp;&middot;&nbsp; Claude AI Reference
        </div>
        <div style="display:flex; gap:10px; align-items:center;">
            <select id="model-select" title="Select AI model">
                <option value="claude-sonnet-4-6" selected>Claude Sonnet 4.6 $$</option>
                <option value="claude-opus-4-6">Claude Opus 4.6 $$$</option>
            </select>
        </div>
    </header>

    <div class="main-container">
        <div class="chat-area">
            <div class="messages" id="messages"></div>
            <div id="convo-banner" class="convo-banner"></div>
            <div id="image-previews" style="padding: 0 20px; display: flex; gap: 8px;"></div>
            <div class="input-area">
                <div class="input-group">
                    <button class="upload-btn" data-tooltip="Upload a site plan or document image" onclick="document.getElementById('file-input').click()" aria-label="Upload an image">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                            <circle cx="8.5" cy="8.5" r="1.5"/>
                            <polyline points="21 15 16 10 5 21"/>
                        </svg>
                    </button>
                    <input type="file" id="file-input" multiple style="display:none" onchange="handleFiles(this)" accept="image/*">
                    <textarea id="user-input" placeholder="Ask about the Pasco Municipal Code..."></textarea>
                    <button class="copy-btn" data-tooltip="Copy last response" onclick="copyLastResponse()" aria-label="Copy last AI response">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
                            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
                        </svg>
                    </button>
                    <button class="btn" onclick="sendMessage()">Send</button>
                </div>
            </div>
        </div>
    </div>

    <footer style="text-align:center; padding:4px 0 6px; font-size:0.7em; color:#aaa; border-top:1px solid var(--border); background:white;">
        <span id="version-stamp">pmc2</span>
    </footer>

    <script>
        let HISTORY = []; let PENDING_IMAGES = [];
        let SESSION_ID = 'session_' + Date.now() + '_' + Math.random().toString(36).slice(2, 7);
        let LAST_RESPONSE_TEXT = '';

        // ── Conversation length guard ─────────────────────────────────────────
        const WARN_TURNS = 20;
        const STOP_TURNS = 30;

        // ── TUNABLE COST CONTROL — keep in sync with api-proxy.php ──────────
        const MAX_HISTORY_CHARS = 80_000;

        function syncKeyboardOffset() {
            let keyboardOffset = 0;
            if (window.visualViewport) {
                const viewport = window.visualViewport;
                keyboardOffset = Math.max(0, window.innerHeight - viewport.height - viewport.offsetTop);
            }
            document.documentElement.style.setProperty('--keyboard-offset', `${Math.round(keyboardOffset)}px`);
        }
        window.addEventListener('resize', syncKeyboardOffset);
        if (window.visualViewport) {
            window.visualViewport.addEventListener('resize', syncKeyboardOffset);
            window.visualViewport.addEventListener('scroll', syncKeyboardOffset);
        }
        syncKeyboardOffset();

        function checkConversationLength() {
            const turns = Math.floor(HISTORY.length / 2);
            const banner = document.getElementById('convo-banner');
            const sendBtn = document.querySelector('.btn[onclick="sendMessage()"]');
            const textarea = document.getElementById('user-input');

            if (turns >= STOP_TURNS) {
                banner.className = 'convo-banner stop';
                banner.style.display = 'block';
                banner.innerHTML = '&#x1F6D1; <strong>Conversation limit reached.</strong> This chat has grown very long. Please refresh the page to start a new session.';
                sendBtn.disabled = true;
                sendBtn.title = 'Refresh the page to start a new conversation';
                textarea.disabled = true;
                textarea.placeholder = 'Please refresh the page to start a new conversation.';
            } else if (turns >= WARN_TURNS) {
                if (!banner.classList.contains('stop')) {
                    banner.className = 'convo-banner warn';
                    banner.style.display = 'block';
                    banner.innerHTML = '&#x26A0;&#xFE0F; <strong>Long session.</strong> Conversation history is growing large — Opus fills the context buffer faster. Refresh to start a fresh session; your PMC access is unaffected. <button class="dismiss" onclick="this.parentElement.style.display=\'none\'" title="Dismiss">&#x2715;</button>';
                }
            }
        }

        // ── Rich message formatter: math (KaTeX) + full markdown ─────────────
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function formatMessage(text) {
            if (!text) return '';
            const rawPlaceholders = [];

            // 1. Fenced code blocks
            text = text.replace(/```(\w*)\n?([\s\S]*?)```/g, (match, lang, code) => {
                const escaped = code.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
                const html = `<pre><code class="language-${lang}">${escaped}</code></pre>`;
                rawPlaceholders.push(html);
                return `\x01RAW${rawPlaceholders.length - 1}\x01`;
            });

            // 2. Block math $$...$$
            text = text.replace(/\$\$([\s\S]+?)\$\$/g, (match, latex) => {
                let html;
                try {
                    html = window.katex
                        ? katex.renderToString(latex.trim(), { displayMode: true, throwOnError: false })
                        : `<div>$$${latex}$$</div>`;
                } catch(e) { html = match; }
                rawPlaceholders.push(html);
                return `\x01RAW${rawPlaceholders.length - 1}\x01`;
            });

            // 3. Inline math $...$ — negative lookahead prevents currency like $100 from matching
            text = text.replace(/\$(?!\d)([^\$\n]+?)\$(?!\d)/g, (match, latex) => {
                let html;
                try {
                    html = window.katex
                        ? katex.renderToString(latex.trim(), { displayMode: false, throwOnError: false })
                        : `<span>$${latex}$</span>`;
                } catch(e) { html = match; }
                rawPlaceholders.push(html);
                return `\x01RAW${rawPlaceholders.length - 1}\x01`;
            });

            // 4. HTML-escape the rest
            let f = escapeHtml(text);

            // 5. Inline formatting
            f = f.replace(/`([^`]+)`/g, '<code>$1</code>');
            f = f.replace(/\*\*([^*\n]+)\*\*/g, '<strong>$1</strong>');
            f = f.replace(/\*([^*\n]+)\*/g, '<em>$1</em>');
            f = f.replace(/~~([^~\n]+)~~/g, '<del>$1</del>');
            f = f.replace(/\^\{([^}]+)\}/g, '<sup>$1</sup>');
            f = f.replace(/\^(\S+)/g, '<sup>$1</sup>');
            f = f.replace(/\_\{([^}]+)\}/g, '<sub>$1</sub>');
            f = f.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');

            // 6. Block-level pass
            const lines = f.split('\n');
            const out = [];
            let i = 0;
            while (i < lines.length) {
                const line = lines[i];
                if (/^#### /.test(line)) { out.push(`<h4>${line.slice(5)}</h4>`); i++; continue; }
                if (/^### /.test(line))  { out.push(`<h3>${line.slice(4)}</h3>`); i++; continue; }
                if (/^## /.test(line))   { out.push(`<h2>${line.slice(3)}</h2>`); i++; continue; }
                if (/^# /.test(line))    { out.push(`<h1>${line.slice(2)}</h1>`); i++; continue; }
                if (/^(\-{3,}|\*{3,}|_{3,})$/.test(line.trim())) { out.push('<hr>'); i++; continue; }
                if (/^&gt; /.test(line)) {
                    const bqLines = [];
                    while (i < lines.length && /^&gt; /.test(lines[i])) { bqLines.push(lines[i].slice(5)); i++; }
                    out.push(`<blockquote>${bqLines.join('<br>')}</blockquote>`);
                    continue;
                }
                if (/^\|/.test(line)) {
                    const tbl = [];
                    while (i < lines.length && /^\|/.test(lines[i])) { tbl.push(lines[i]); i++; }
                    if (tbl.length >= 3 && /^\|[\s\-:|]+\|$/.test(tbl[1].trim())) {
                        const pr = (l) => l.trim().replace(/^\||\|$/g,'').split('|').map(c => c.trim());
                        const hdr = pr(tbl[0]); const rows = tbl.slice(2).map(pr);
                        const thead = '<thead><tr>' + hdr.map(h => `<th>${h}</th>`).join('') + '</tr></thead>';
                        const tbody = '<tbody>' + rows.map(r => '<tr>' + r.map(c => `<td>${c}</td>`).join('') + '</tr>').join('') + '</tbody>';
                        out.push(`<table>${thead}${tbody}</table>`);
                    } else { out.push(...tbl); }
                    continue;
                }
                if (/^\d+\. /.test(line)) {
                    const items = [];
                    while (i < lines.length && /^\d+\. /.test(lines[i])) { items.push(`<li>${lines[i].replace(/^\d+\. /, '')}</li>`); i++; }
                    out.push(`<ol>${items.join('')}</ol>`); continue;
                }
                if (/^(\s{0,3})[*\-] /.test(line)) {
                    const items = [];
                    while (i < lines.length && /^(\s{0,3})[*\-] /.test(lines[i])) {
                        const raw = lines[i].replace(/^(\s{0,3})[*\-] /, '');
                        if (/^\[ \] /.test(raw))       items.push(`<li class="task-item">&#9744; ${raw.slice(4)}</li>`);
                        else if (/^\[x\] /i.test(raw)) items.push(`<li class="task-item checked">&#9745; ${raw.slice(4)}</li>`);
                        else                            items.push(`<li>${raw}</li>`);
                        i++;
                        const nested = [];
                        while (i < lines.length && /^(\s{2,})[*\-] /.test(lines[i])) { nested.push(`<li>${lines[i].replace(/^(\s+)[*\-] /, '')}</li>`); i++; }
                        if (nested.length) items.push(`<ul class="nested">${nested.join('')}</ul>`);
                    }
                    out.push(`<ul>${items.join('')}</ul>`); continue;
                }
                out.push(line); i++;
            }

            // 7. Wrap loose text in <p>
            const blockTags = /^<(h[1-6]|ul|ol|li|table|blockquote|pre|hr|div)/;
            f = out.join('\n').split(/\n{2,}/).map(block => {
                const trimmed = block.trim();
                if (!trimmed) return '';
                if (blockTags.test(trimmed)) return trimmed;
                return `<p>${trimmed.replace(/\n/g, '<br>')}</p>`;
            }).filter(Boolean).join('\n');

            // 8. Restore placeholders
            rawPlaceholders.forEach((html, idx) => { f = f.split(`\x01RAW${idx}\x01`).join(html); });
            return f;
        }

        // ── Image upload (Claude format) ──────────────────────────────────────
        function handleFiles(input) {
            for (let file of input.files) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    // Claude image format: { type, source: { type, media_type, data } }
                    PENDING_IMAGES.push({
                        type: 'image',
                        source: { type: 'base64', media_type: file.type, data: e.target.result.split(',')[1] }
                    });
                    const img = document.createElement('img'); img.src = e.target.result;
                    document.getElementById('image-previews').appendChild(img);
                };
                reader.readAsDataURL(file);
            }
        }

        async function sendMessage() {
            const input = document.getElementById('user-input');
            const text = input.value.trim();
            if (!text && PENDING_IMAGES.length === 0) return;

            const imageCount = PENDING_IMAGES.length;
            appendBubble('user', text || "(Image Uploaded)");

            // ── Build content for this turn ───────────────────────────────────
            // Claude uses { type: 'text', text: '...' } blocks in an array
            const apiContent = [];
            if (text) apiContent.push({ type: 'text', text: text });
            PENDING_IMAGES.forEach(img => apiContent.push(img));

            // HISTORY is text-only (images replaced with readable placeholder)
            const historyContent = text
                + (imageCount > 0 ? ` [uploaded ${imageCount} image(s)]` : '');

            HISTORY.push({ role: 'user', content: historyContent });
            input.value = '';
            document.getElementById('image-previews').innerHTML = '';
            PENDING_IMAGES = [];

            const logUserText = imageCount > 0
                ? (text ? `${text} [+ ${imageCount} image(s)]` : `[${imageCount} image(s) uploaded]`)
                : text;

            // Build messages for the API: prior turns from HISTORY (text), current turn with images
            const messagesForApi = [
                ...HISTORY.slice(0, -1).map(m => ({
                    role: m.role,
                    content: m.content
                })),
                { role: 'user', content: apiContent.length === 1 && !imageCount
                    ? apiContent[0].text          // plain string for text-only
                    : apiContent                  // array for mixed content
                }
            ];

            // ── Payload size guard ────────────────────────────────────────────
            const historyChars = JSON.stringify(HISTORY).length;
            if (historyChars > MAX_HISTORY_CHARS) {
                HISTORY.pop();
                const approxTokens = Math.round(historyChars / 4).toLocaleString();
                const banner = document.getElementById('convo-banner');
                banner.className = 'convo-banner stop';
                banner.style.display = 'block';
                banner.innerHTML = `&#x1F6D1; <strong>Context limit reached (~${approxTokens} tokens).</strong> Your conversation history is too large to send. Please start a new session.`;
                document.querySelector('.btn[onclick="sendMessage()"]').disabled = true;
                document.getElementById('user-input').disabled = true;
                return;
            }

            // Show thinking bubble
            const messagesDiv = document.getElementById('messages');
            const thinkingDiv = document.createElement('div');
            thinkingDiv.className = 'message assistant';
            thinkingDiv.innerHTML = '<div class="bubble thinking-bubble">Thinking\u2026</div>';
            messagesDiv.appendChild(thinkingDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;

            const requestBody = JSON.stringify({
                action:     'chat',
                session_id: SESSION_ID,
                model:      document.getElementById('model-select').value,
                system:     MASTER_RUBRIC,
                messages:   messagesForApi
            });

            const modelLabel = document.getElementById('model-select').selectedOptions[0].text;

            // Add model label beneath the user bubble
            const userMsgDiv = messagesDiv.lastElementChild;
            if (userMsgDiv && userMsgDiv.previousElementSibling) {
                // The thinking bubble is lastElementChild; user bubble is the one before
                const actualUserDiv = thinkingDiv.previousElementSibling;
                if (actualUserDiv) {
                    const userModelTag = document.createElement('div');
                    userModelTag.className = 'meta-tags';
                    userModelTag.style.justifyContent = 'flex-end';
                    const mt = document.createElement('span');
                    mt.className = 'ttfb-tag';
                    mt.textContent = modelLabel;
                    userModelTag.appendChild(mt);
                    actualUserDiv.appendChild(userModelTag);
                }
            }

            let assistantDiv = null;

            try {
                const fetchStart = performance.now();
                const res = await fetch('api-proxy.php?stream=1', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: requestBody
                });

                if (!res.ok || !res.body) throw new Error('Stream unavailable');

                thinkingDiv.remove();
                assistantDiv = document.createElement('div');
                assistantDiv.className = 'message assistant';
                assistantDiv.innerHTML = '<div class="bubble"></div>';
                messagesDiv.appendChild(assistantDiv);
                const bubbleEl = assistantDiv.querySelector('.bubble');

                const reader = res.body.getReader();
                const decoder = new TextDecoder();
                let accumulated = '';
                let partialLine = '';
                let ttfbMs = null;
                let cachedTokens = null;
                let cacheWrite = null;
                let streamDone = false;

                while (!streamDone) {
                    const { value, done } = await reader.read();
                    if (done) break;

                    partialLine += decoder.decode(value, { stream: true });
                    const lines = partialLine.split('\n');
                    partialLine = lines.pop();

                    for (const line of lines) {
                        const trimmed = line.trimEnd();
                        if (!trimmed.startsWith('data: ')) continue;

                        const payload = trimmed.slice(6);
                        if (payload === '[DONE]') { streamDone = true; break; }

                        let parsed;
                        try { parsed = JSON.parse(payload); } catch { continue; }

                        if (parsed.error) {
                            throw new Error(parsed.error?.message || JSON.stringify(parsed.error));
                        }

                        // Metadata event (cache + token counts)
                        if (parsed.meta) {
                            cachedTokens = parsed.meta.cachedTokens ?? 0;
                            cacheWrite   = parsed.meta.cacheWrite   ?? 0;
                            continue;
                        }

                        // Text delta
                        const delta = parsed.text ?? null;
                        if (delta) {
                            if (ttfbMs === null) {
                                ttfbMs = Math.round(performance.now() - fetchStart);
                            }
                            accumulated += delta;
                            bubbleEl.innerHTML = formatMessage(accumulated);
                            messagesDiv.scrollTop = messagesDiv.scrollHeight;
                        }
                    }
                }

                // Show TTFB + cache badge beneath the bubble
                if (accumulated && (ttfbMs !== null || cachedTokens !== null)) {
                    const metaRow = document.createElement('div');
                    metaRow.className = 'meta-tags';

                    if (ttfbMs !== null) {
                        const ttfbTag = document.createElement('span');
                        ttfbTag.className = 'ttfb-tag';
                        ttfbTag.textContent = `⏱ ${ttfbMs < 1000 ? ttfbMs + 'ms' : (ttfbMs/1000).toFixed(1) + 's'}`;
                        metaRow.appendChild(ttfbTag);
                    }

                    if (cachedTokens !== null) {
                        const cacheTag = document.createElement('span');
                        if (cachedTokens > 0) {
                            const pct = Math.round(cachedTokens / 1000);
                            cacheTag.className = 'cache-tag hit';
                            cacheTag.title = `${cachedTokens.toLocaleString()} tokens read from cache (90% discount)`;
                            cacheTag.textContent = `⚡ cached ${pct}k tok`;
                        } else if (cacheWrite > 0) {
                            const pct = Math.round(cacheWrite / 1000);
                            cacheTag.className = 'cache-tag write';
                            cacheTag.title = `${cacheWrite.toLocaleString()} tokens written to cache — next query gets 90% off`;
                            cacheTag.textContent = `✍ wrote ${pct}k tok`;
                        } else {
                            cacheTag.className = 'cache-tag miss';
                            cacheTag.title = 'No cached tokens — cache may not be active';
                            cacheTag.textContent = '○ no cache';
                        }
                        metaRow.appendChild(cacheTag);
                    }

                    const modelTag = document.createElement('span');
                    modelTag.className = 'ttfb-tag';
                    modelTag.textContent = modelLabel;
                    metaRow.appendChild(modelTag);

                    assistantDiv.appendChild(metaRow);
                }

                if (accumulated) {
                    LAST_RESPONSE_TEXT = accumulated;
                    HISTORY.push({ role: 'assistant', content: accumulated });
                    logQuery(logUserText, accumulated, ttfbMs);
                    checkConversationLength();
                } else {
                    assistantDiv.remove();
                    appendBubble('assistant', '⚠️ No response received. The server may be unavailable.');
                }

            } catch (err) {
                // Streaming failed — fall back to non-streaming route
                const errText = err?.message || String(err);
                console.warn('SSE stream failed, falling back:', errText);
                thinkingDiv.remove();
                assistantDiv?.remove();

                try {
                    const res = await fetch('api-proxy.php', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: requestBody
                    });
                    const data = await res.json();
                    // Claude non-streaming response: data.content[0].text
                    if (data.content && Array.isArray(data.content)) {
                        let reply = '';
                        for (const block of data.content) {
                            if (block.type === 'text') reply += block.text;
                        }
                        if (reply) {
                            LAST_RESPONSE_TEXT = reply;
                            appendBubble('assistant', reply);
                            HISTORY.push({ role: 'assistant', content: reply });
                            logQuery(logUserText, reply, null);
                            checkConversationLength();
                        } else {
                            appendBubble('assistant', '⚠️ Empty response from Claude.');
                        }
                    } else {
                        const errMsg = data.error?.message || (typeof data.error === 'string' ? data.error : 'Connection failed.');
                        appendBubble('assistant', '⚠️ ' + errMsg);
                    }
                } catch (fallbackErr) {
                    appendBubble('assistant', `⚠️ Connection failed. Try again, or refresh if this persists. (${errText})`);
                }
            }
        }

        async function logQuery(userText, botReply, ttfbMs) {
            fetch('api-proxy.php', {
                method: 'POST',
                body: JSON.stringify({
                    action:     'log_query',
                    session_id: SESSION_ID,
                    ttfb_ms:    ttfbMs,
                    log:        `USER: ${userText}\nBOT: ${botReply}\n---\n`
                })
            });
        }

        async function copyLastResponse() {
            if (!LAST_RESPONSE_TEXT) return;
            try {
                await navigator.clipboard.writeText(LAST_RESPONSE_TEXT);
                const btn = document.querySelector('.copy-btn');
                const orig = btn.getAttribute('data-tooltip');
                btn.setAttribute('data-tooltip', 'Copied!');
                setTimeout(() => btn.setAttribute('data-tooltip', orig), 1500);
            } catch {
                const ta = document.createElement('textarea');
                ta.value = LAST_RESPONSE_TEXT;
                ta.style.position = 'fixed'; ta.style.opacity = '0';
                document.body.appendChild(ta); ta.select();
                document.execCommand('copy');
                document.body.removeChild(ta);
            }
        }

        function appendBubble(role, text) {
            const messagesDiv = document.getElementById('messages');
            const msgDiv = document.createElement('div');
            // Claude uses 'assistant' (not 'model') — map to CSS class
            msgDiv.className = `message ${role === 'assistant' ? 'assistant' : role}`;
            const bubble = document.createElement('div');
            bubble.className = 'bubble';
            bubble.innerHTML = formatMessage(text);
            msgDiv.appendChild(bubble);
            messagesDiv.appendChild(msgDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
            return msgDiv;
        }

        function handleKeydown(e) {
            if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
        }
        document.getElementById('user-input').addEventListener('keydown', handleKeydown);

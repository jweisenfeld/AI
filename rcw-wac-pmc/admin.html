<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PMC Proxy Admin</title>
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; margin: 20px; background: #f4f7fb; color: #1a2a3a; }
    h1 { margin: 0 0 12px; }
    .card { background: #fff; border: 1px solid #d0d8e2; border-radius: 8px; padding: 12px 14px; margin: 10px 0; }
    button { padding: 7px 12px; border-radius: 6px; border: 1px solid #4a6a8a; background: #1a3a5c; color: #fff; cursor: pointer; }
    button:disabled { opacity: .55; cursor: default; }
    pre { background: #f0f4f9; border: 1px solid #d0d8e2; border-radius: 6px; padding: 10px; overflow-x: auto; font-size: 12px; }
    .ok { color: #1c7c34; font-weight: 700; }
    .err { color: #b12a2a; font-weight: 700; }
  </style>
</head>
<body>
  <h1>PMC Admin</h1>
  <div class="card">
    <button id="run">Run Diagnostics</button>
    <span id="status"></span>
  </div>
  <div class="card">
    <h3>Stats RPC (?stats=1)</h3>
    <div id="statsResult"></div>
  </div>
  <div class="card">
    <h3>Prompt route (?prompt=1)</h3>
    <div id="promptResult"></div>
  </div>
  <div class="card">
    <h3>SSE test route (?stream=test)</h3>
    <div id="streamResult"></div>
  </div>

  <script>
    const runBtn = document.getElementById('run');
    const statusEl = document.getElementById('status');
    const statsEl = document.getElementById('statsResult');
    const promptEl = document.getElementById('promptResult');
    const streamEl = document.getElementById('streamResult');

    function ok(msg) { return `<span class="ok">OK</span> ${msg}`; }
    function err(msg) { return `<span class="err">ERROR</span> ${msg}`; }
    function pretty(v) { return `<pre>${JSON.stringify(v, null, 2)}</pre>`; }

    async function run() {
      runBtn.disabled = true;
      statusEl.textContent = ' Running...';
      statsEl.innerHTML = promptEl.innerHTML = streamEl.innerHTML = '';

      try {
        // Stats check
        try {
          const resp = await fetch('api-proxy.php?stats=1');
          const data = await resp.json();
          statsEl.innerHTML = ok('stats route reachable') + pretty(data);
        } catch (e) {
          statsEl.innerHTML = err(e.message);
        }

        // Prompt check
        try {
          const resp = await fetch('api-proxy.php?prompt=1');
          const data = await resp.json();
          const p = data.prompt || '';
          promptEl.innerHTML = ok(`prompt route reachable (${p.length} chars)`);
        } catch (e) {
          promptEl.innerHTML = err(e.message);
        }

        // Stream test check
        try {
          const resp = await fetch('api-proxy.php?stream=test');
          const txt = await resp.text();
          const hasDone = txt.includes('[DONE]');
          const hasText = txt.includes('"text"');
          streamEl.innerHTML = (hasDone && hasText)
            ? ok('stream test emitted text + DONE')
            : err('stream test response missing expected SSE markers');
          streamEl.innerHTML += `<pre>${txt.slice(0, 1200)}</pre>`;
        } catch (e) {
          streamEl.innerHTML = err(e.message);
        }
      } finally {
        statusEl.textContent = ' Finished';
        runBtn.disabled = false;
      }
    }

    runBtn.addEventListener('click', run);
  </script>
</body>
</html>
